<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sophia TeamAgent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div>
            <strong>Sophia</strong>
            <span>TeamAgent</span>
          </div>
        </div>

        <label class="search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
          </svg>
          <input id="searchInput" type="search" placeholder="搜索任务、文档、Agent" />
        </label>

        <nav class="nav-stack">
          <button class="nav-item is-active" type="button" data-view="office">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v6M4 11h16M4 11v8a2 2 0 0 0 2 2h4v-5h4v5h4a2 2 0 0 0 2-2v-8" /></svg>
            办公室
          </button>
          <button class="nav-item" type="button" data-view="documents">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h7l5 5v13H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm7 0v6h6" /></svg>
            文档包
          </button>
          <button class="nav-item" type="button" data-view="agents">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v4m0 10v4M5 8l3 2m8 4 3 2M19 8l-3 2m-8 4-3 2m4-4a3 3 0 1 0 6 0 3 3 0 0 0-6 0Z" /></svg>
            Agent 广场
          </button>
          <button class="nav-item" type="button" data-view="settings">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Zm7.4-2.1.1-1.4-.1-1.4 2-1.5-2-3.4-2.5 1a8.5 8.5 0 0 0-2.4-1.4L14.1 3H9.9l-.4 2.3A8.5 8.5 0 0 0 7.1 6.7l-2.5-1-2 3.4 2 1.5-.1 1.4.1 1.4-2 1.5 2 3.4 2.5-1a8.5 8.5 0 0 0 2.4 1.4l.4 2.3h4.2l.4-2.3a8.5 8.5 0 0 0 2.4-1.4l2.5 1 2-3.4-2-1.5Z" /></svg>
            模型配置
          </button>
        </nav>

        <div class="sidebar-section">
          <span>知识库</span>
          <button class="side-link" type="button">Delaware C-Corp</button>
          <button class="side-link" type="button">AI SaaS 条款库</button>
          <button class="side-link" type="button">Founder Equity</button>
        </div>

        <div class="sidebar-section">
          <span>最近对话</span>
          <button class="history-item" type="button">
            <strong>Post-formation package</strong>
            <small>多 Agent 协作草拟中</small>
          </button>
        </div>

        <div class="profile">
          <div class="avatar">G</div>
          <div>
            <strong>GoKou</strong>
            <span>Local NVIDIA API</span>
          </div>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <button class="icon-button" type="button" aria-label="收起侧栏">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h10M4 18h16" /></svg>
          </button>
          <div>
            <p>Marvis办公室</p>
            <h1>Sophia 法务文档工作台</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" type="button" id="exportButton">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 21h14" /></svg>
              导出 Brief
            </button>
            <button class="primary-button" type="button" id="runButton">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 5 11 7-11 7V5Z" /></svg>
              生成 Word
            </button>
          </div>
        </header>

        <section class="office-stage" aria-label="Agent 协作画布">
          <img class="office-map" src="./assets/workstation@2x.webp" alt="" />
          <div class="stage-title">
            <span>LIVE ROUTING</span>
            <strong id="activeAgentTitle">planner 正在整理文档结构</strong>
          </div>

          <button class="agent-node planner is-selected" type="button" data-agent="planner" style="--x: 52%; --y: 32%">
            <span class="agent-label">Planner</span>
            <span class="agent-sprite sprite-standby"></span>
          </button>
          <button class="agent-node drafter" type="button" data-agent="drafter" style="--x: 62%; --y: 69%">
            <span class="agent-label">Drafter</span>
            <span class="agent-sprite sprite-working"></span>
          </button>
          <button class="agent-node coder" type="button" data-agent="coder" style="--x: 40%; --y: 66%">
            <span class="agent-label">Coder</span>
            <span class="agent-sprite sprite-salute"></span>
          </button>
          <button class="agent-node analyst" type="button" data-agent="analyst" style="--x: 50%; --y: 50%">
            <span class="agent-label">Analyst</span>
            <span class="agent-sprite sprite-working"></span>
          </button>
          <button class="agent-node reviewer" type="button" data-agent="reviewer" style="--x: 70%; --y: 42%">
            <span class="agent-label">Reviewer</span>
            <span class="agent-sprite sprite-standby"></span>
          </button>

          <div class="route-line route-a"></div>
          <div class="route-line route-b"></div>
        </section>

        <section class="brief-panel">
          <div class="panel-heading">
            <div>
              <p>输入需求</p>
              <h2>公司资料与生成目标</h2>
            </div>
            <div class="segmented" role="tablist" aria-label="生成模式">
              <button class="is-active" type="button">完整包</button>
              <button type="button">只生成清单</button>
              <button type="button">模板草拟</button>
            </div>
          </div>
          <textarea id="briefInput" spellcheck="false">Company legal name:
Delaware file number:
Founder 1:
Founder 2:
Ownership: 50/50
Business: AI agents, staffing automation, SaaS workflow products
Special notes:</textarea>
        </section>
      </main>

      <aside class="inspector" aria-label="任务详情">
        <section class="metric-strip">
          <div>
            <span>今日消耗 Token</span>
            <strong id="tokenUsed">0</strong>
            <small>/ 1000万</small>
          </div>
          <div>
            <span>本地节省 Token</span>
            <strong id="tokenSaved">0</strong>
            <small>缓存复用</small>
          </div>
        </section>

        <section class="inspector-block">
          <div class="panel-heading compact">
            <div>
              <p>Agent 队列</p>
              <h2>模型分工</h2>
            </div>
            <span class="status-pill" id="runStatus">待命</span>
          </div>
          <div class="agent-list" id="agentList"></div>
        </section>

        <section class="inspector-block">
          <div class="panel-heading compact">
            <div>
              <p>文档进度</p>
              <h2>Post-formation package</h2>
            </div>
          </div>
          <div class="progress-ring" aria-label="完成进度">
            <svg viewBox="0 0 120 120" aria-hidden="true">
              <circle cx="60" cy="60" r="50"></circle>
              <circle id="progressCircle" cx="60" cy="60" r="50"></circle>
            </svg>
            <strong id="progressValue">18%</strong>
          </div>
          <ol class="timeline" id="timeline"></ol>
        </section>
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
