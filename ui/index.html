<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sophia TeamAgent</title>
    <link rel="icon" type="image/jpeg" href="./assets/site-logo.jpg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <img class="brand-mark" src="./assets/brand-goku.png" alt="" aria-hidden="true" />
          <div>
            <strong>Sophia</strong>
            <span>TeamAgent</span>
          </div>
        </div>

        <label class="search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.3-4.3m1.3-5.2a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" />
          </svg>
          <input id="searchInput" type="search" placeholder="搜索" />
        </label>

        <nav class="nav-stack">
          <button class="nav-item" type="button" id="runButton">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" /></svg>
            新建对话
          </button>
          <button class="nav-item" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7v5l3.5 2M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z" /></svg>
            自动任务
          </button>
          <button class="nav-item" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14.7 6.3 3 3L8.8 18.2H5.8v-3.1l8.9-8.8ZM16 5l1.1-1.1a2.1 2.1 0 0 1 3 3L19 8" /></svg>
            技能广场
          </button>
        </nav>

        <section class="sidebar-section">
          <span>本地知识库</span>
          <button class="library-item" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h7v7H4V4Zm9 0h7v7h-7V4ZM4 13h7v7H4v-7Zm9 0h7v7h-7v-7Z" /></svg>
            应用
          </button>
          <button class="library-item" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h7l5 5v13H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm7 0v6h6" /></svg>
            文档
          </button>
          <button class="library-item" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4V5Zm3 10 3.2-3.2 2.2 2.2 2.9-3.4L19 15M8 8.8h.1" /></svg>
            图库
          </button>
          <button class="library-item" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v11H4V5Zm3 15h10M9 16v4m6-4v4" /></svg>
            此电脑
          </button>
        </section>

        <section class="sidebar-section conversations">
          <span>对话</span>
          <button class="conversation-pill is-active" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 17.5A7.6 7.6 0 0 1 5 12a7 7 0 0 1 7-7 7.6 7.6 0 0 1 5.5 3M16 6.5A7.6 7.6 0 0 1 19 12a7 7 0 0 1-7 7 7.6 7.6 0 0 1-5.5-3" /></svg>
            办公室
          </button>
          <button class="history-item" type="button">
            <strong>公司设立文件包，为...</strong>
            <small>多 Agent 协作草拟中</small>
          </button>
        </section>

        <div class="profile">
          <div class="avatar">G</div>
          <strong>GoKou</strong>
          <button class="phone-button" type="button" aria-label="设备">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2h8a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2Zm3 17h2" /></svg>
          </button>
        </div>
      </aside>

      <main class="office">
        <header class="office-title">
          <h1>Sophia办公室</h1>
        </header>

        <section class="office-scene" id="officeStage" aria-label="Agent 办公室">
          <img class="office-map" src="./assets/star-office/office_bg.webp" alt="" />

          <svg class="route-layer" viewBox="0 0 100 100" aria-hidden="true">
            <path class="route route-a" d="M50 42 C45 47 40 48 35 50" />
            <path class="route route-b" d="M50 42 C55 48 59 49 63 50" />
            <path class="route route-c" d="M50 42 C58 39 66 36 73 34" />
            <circle class="pulse p1" r="0.55">
              <animateMotion dur="4.2s" repeatCount="indefinite" path="M50 42 C45 47 40 48 35 50 C44 47 50 42 63 50" />
            </circle>
            <circle class="pulse p2" r="0.48">
              <animateMotion dur="5.4s" begin="1s" repeatCount="indefinite" path="M50 42 C58 39 66 36 73 34" />
            </circle>
          </svg>

          <button class="agent-node lead is-active" type="button" data-agent="planner" style="--x: 50%; --y: 42%">
            <span class="agent-label">Planner</span>
            <span class="agent-sprite sprite-standby"></span>
            <span class="agent-glow"></span>
          </button>

          <button class="agent-node file" type="button" data-agent="file" style="--x: 35%; --y: 50%">
            <span class="agent-label">File Agent</span>
            <span class="agent-sprite sprite-standby"></span>
            <span class="agent-glow"></span>
          </button>

          <button class="agent-node browser" type="button" data-agent="browser" style="--x: 63%; --y: 50%">
            <span class="agent-label">Browser Agent</span>
            <span class="agent-sprite sprite-standby"></span>
            <span class="agent-glow"></span>
          </button>

          <button class="agent-node review" type="button" data-agent="reviewer" style="--x: 73%; --y: 34%">
            <span class="agent-label">Reviewer</span>
            <span class="agent-sprite sprite-standby"></span>
            <span class="agent-glow"></span>
          </button>
        </section>
      </main>

      <aside class="inspector" aria-label="对话明细">
        <div class="window-tools" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7M10 21h4" /></svg>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <section class="metrics">
          <article>
            <span>今日消耗Token</span>
            <strong><b id="tokenUsed">0</b><em>/1000万</em></strong>
          </article>
          <article>
            <span>今日节省Token</span>
            <strong><b id="tokenSaved">0</b></strong>
            <small>使用本地模型节省</small>
          </article>
        </section>

        <section class="detail-panel">
          <div class="detail-head">
            <span>对话明细</span>
            <button type="button">全部 ▾</button>
          </div>
          <div class="count-strip">
            <div>
              <strong id="runningCount">0</strong>
              <span>进行中</span>
            </div>
            <div>
              <strong id="doneCount">1</strong>
              <span>已完成</span>
            </div>
            <div>
              <strong>1</strong>
              <span>总计</span>
            </div>
          </div>

          <button class="conversation-row" type="button">
            <div>
              <strong>公司设立文件包，为什么会...</strong>
              <span>累计Token消耗33599</span>
            </div>
            <div>
              <em id="runStatus">已完成</em>
              <span>02:52 05/31</span>
            </div>
          </button>

          <p class="end-text">没有更多了</p>
        </section>

        <section class="agent-detail">
          <div class="detail-head">
            <span>Agent 队列</span>
            <button type="button" id="exportButton">导出 Brief</button>
          </div>
          <div class="agent-list" id="agentList"></div>
        </section>

        <section class="progress-panel">
          <div>
            <span>文档进度</span>
            <strong id="progressValue">18%</strong>
          </div>
          <div class="progress-track"><i id="progressBar"></i></div>
          <ol class="timeline" id="timeline"></ol>
        </section>

        <textarea id="briefInput" spellcheck="false">Company legal name:
Delaware file number:
Founder 1:
Founder 2:
Ownership: 50/50
Business: AI agents, staffing automation, SaaS workflow products
Special notes:</textarea>
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
